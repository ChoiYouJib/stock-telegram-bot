name: Daily Stock Bot
on:
  schedule:
    # 한국 시간 기준 스케줄 (UTC 기준 9시간 차감)
    - cron: '0 0 * * *'    # 09:00 (한국장 개장 직전)
    - cron: '30 2 * * *'   # 11:30 (한국장 점심시간)
    - cron: '30 6 * * *'   # 15:30 (한국장 마감 직전)
    - cron: '0 13 * * *'   # 22:00 (미국장 개장 전)
    - cron: '30 14 * * *'  # 23:30 (미국장 개장 직후) - 추가됨
    - cron: '0 22 * * *'   # 07:00 (미국장 마감 직후)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot yfinance requests feedparser beautifulsoup4
      - name: Run bot
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python telegram_bot.py
